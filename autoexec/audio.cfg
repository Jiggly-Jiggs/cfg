// -------------------------------
// Volume Settings
// -------------------------------

// Master Volume
snd_musicvolume 1

// EQ Profile
snd_headphone_eq 1

// Perspective Correction
snd_steamaudio_enable_perspective_correction 1

// L/R Isolation
snd_spatialize_lerp .8

// Main Menu Volume
snd_menumusic_volume 0.04

// Round Start Volume
snd_roundstart_volume 0.04

// Round Action Volume
snd_roundaction_volume 0.04

// Round End Volume
snd_roundend_volume 0.16

// MVP Volume
snd_mvp_volume 0.16

// Bomb/Hostage Volume
snd_mapobjective_volume 0.0625

// Ten Second Warning Volume
snd_tensecondwarning_volume 0.09

// Death Camera Volume
snd_deathcamera_volume 0.01

// Mute MVP Music when players on both teams are alive
snd_mute_mvp_music_live_players 1
