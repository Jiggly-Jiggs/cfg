// -------------------------------
// Weapon System
// -------------------------------

alias lastgun "to_primary"

alias to_primary   "slot1; switchhandsright; alias lastgun to_primary"
alias to_secondary "slot2; switchhandsright; alias lastgun to_secondary"
alias to_knife     "slot3; switchhandsleft"

bind 1 "to_primary"
bind 2 "to_secondary"
bind 3 "to_knife"


// -------------------------------
// Equipment
// -------------------------------

bind 5 "slot5; slot12; switchhandsright"   // bomb + medi-shot
bind c "slot6; switchhandsright"           // HE grenade
bind z "slot7; switchhandsright"           // flashbang
bind x "slot8; switchhandsright"           // smoke
bind 4 "slot9; slot12; switchhandsright"   // decoy
bind v "slot10; switchhandsright"          // molotov


// -------------------------------
// Movement
// -------------------------------

bind MOUSE1 "+attack"
bind MOUSE2 "+attack2"
bind space  "+jump"
bind mwheeldown "+jump"
unbind mwheelup
bind w "+forward"
bind s "+back"
bind a "+left"
bind d "+right"
cl_scoreboard_mouse_enable_binding "+attack2"


// -------------------------------
// Quick Switch
// -------------------------------

alias +qsw "to_knife"
alias -qsw "lastgun"
bind mouse5 "+qsw"


// -------------------------------
// Communication
// -------------------------------

bind q      "player_ping"
bind mouse3 "+radialradio"
bind p      "say GET LEETIFY"
bind o      "say commend 4 commend"


// -------------------------------
// Bots
// -------------------------------

bind i "holdpos"


// -------------------------------
// Practice Mode
// -------------------------------

bind l         "sv_cheats true; mp_team_intro_time 0; sv_infinite_ammo 2; sv_grenade_trajectory_prac_pipreview 1; bot_kick; mp_roundtime 60.00; mp_roundtime_defuse 60.00; mp_limitteams 0; mp_autoteambalance 0; mp_startmoney 16000; mp_freezetime 0; mp_buytime 3600; mp_round_restart_delay 0; mp_buy_anywhere 1; sv_enablebunnyhopping 0; sv_autobunnyhopping 0; sv_accelerate 5.5; sv_airaccelerate 012; sv_friction 5.2; sv_maxvelocity 3500; sv_staminalandcost 0.05; sv_staminajumpcost 0.08; mp_restartgame 1"
bind semicolon "noclip"
bind '         "sv_rethrow_last_grenade"
bind /         "ent_fire smokegrenade_projectile kill; stopsound"
bind [         "getpos"
bind ]         "setpos"


// -------------------------------
// Tripp Binds
// -------------------------------

alias revert_tt "alias tt"
alias tt

alias +c_ "exec otag/+c"
alias -c_ "exec otag/-c"
bind ctrl +c_
bind ctrl +duck

alias +lj "+jump;-!duck"
alias -lj "-jump;+!duck"
bind space +lj