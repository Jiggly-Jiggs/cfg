// -------------------------------
// Game Settings
// -------------------------------

// Show equipped character model in player avatars
cl_show_equipped_character_for_player_avatars true

// Max Acceptable Matchmaking Ping
mm_dedicated_search_maxping 50

// HUD Color
cl_hud_color 12

// Show Team ID Through Walls
cl_teamid_overhead_mode 3

// Show Player Colors in Competitive
cl_teammate_colors_show 2

// Nickname Transparency (Def: 0.5)
cl_teamid_overhead_fade_near_crosshair 0.75

// Allow Animated Avatars
cl_allow_animated_avatars 0

// Viewmodel configuration
viewmodel_presetpos 2

// Toggle detach silencer
cl_silencer_mode 0

// Radar is zooming dynamically
cl_radar_scale_dynamic true

// Radar Background Transparency (Def: 0.627)
cl_hud_radar_background_alpha 1

// Radar Size (Def: 1.0)
cl_hud_radar_scale 1.2

// Radar Scale (Def: 0.7)
cl_radar_scale 0.7

// +use Key to Open Buy Menu
cl_use_opens_buy_menu 1

// Screen Gamma Value
r_fullscreen_gamma 2.2


// -------------------------------
// Sensitivity Settings
// -------------------------------

// Mouse sensitivity
sensitivity "0.5"

// Zoom sensitivity multiplier
zoom_sensitivity_ratio "1"
// zoom_sensitivity_ratio "0.818933027098955175"
